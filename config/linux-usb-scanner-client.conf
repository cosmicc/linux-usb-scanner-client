# Runtime options for linux-usb-scanner-client.service.
# Edit scanner/server/buffer/logging/update settings, then restart the app with:
#   sudo systemctl restart linux-usb-scanner-client
# Edit alerting settings, then restart the monitor with:
#   sudo systemctl restart linux-usb-scanner-client-monitor

[scanner]
# Match one specific Linux input event device.
#
# To find the correct values, run this on an installed system:
#   sudo /opt/linux-usb-scanner-client/venv/bin/linux-usb-scanner-client list-devices
#
# From a source checkout, run:
#   PYTHONPATH=src python3 -m linux_usb_scanner_client list-devices
#
# Example output:
#   /dev/input/event4  name='Honeywell USB Keyboard'  vendor_id=0x0c2e  product_id=0x0901  phys='usb-0000:00:14.0-1/input0'
#
# In that example:
#   device_path = /dev/input/event4
#   vendor_id = 0x0c2e
#   product_id = 0x0901
#   device_name = Honeywell USB Keyboard
#
# Prefer vendor_id + product_id when available because event numbers can change
# after reboot or reconnect. Use device_path only when the event path is stable.
# Use device_name only when it is unique enough to avoid matching a normal keyboard.
# Default: blank.
device_path =

# USB vendor ID for the scanner, in decimal or hex.
# Copy this from the `vendor_id=...` field printed by `list-devices`.
# You can also run `lsusb` and use the first half of the `ID vvvv:pppp` value.
# Example: if `list-devices` prints vendor_id=0x05e0, set vendor_id = 0x05e0.
# Default: blank.
vendor_id =

# USB product ID for the scanner, in decimal or hex.
# Copy this from the `product_id=...` field printed by `list-devices`.
# You can also run `lsusb` and use the second half of the `ID vvvv:pppp` value.
# Example: if `list-devices` prints product_id=0x1200, set product_id = 0x1200.
# Default: blank.
product_id =

# Case-insensitive substring of the scanner input device name.
# Copy this from the `name='...'` field printed by `list-devices`.
# You may use the full name or a unique substring. For example, if the output is
# name='Honeywell USB Keyboard', `device_name = Honeywell` is acceptable only if
# no other keyboard-like device contains Honeywell in its name.
# Default: blank.
device_name =

# Grabs the scanner input device exclusively so scans do not type into shells or login prompts.
# Keep this true only after the scanner matcher is specific enough to avoid normal keyboards.
# Default: true.
grab_device = true

# Seconds between scanner discovery attempts when the scanner is unavailable.
# Default: 2. Range: greater than 0.
reconnect_interval = 2

# Maximum characters accepted before a CR/LF terminator. Oversized scans are dropped locally.
# Default: 256. Range: greater than 0.
max_scan_chars = 256

# Whether an empty Enter/CR/LF frame should be sent to the server.
# Default: false.
send_empty_scans = false

[server]
# Host or IP address of the industrial-scanner-logger TCP receiver.
# Default: 127.0.0.1.
host = 127.0.0.1

# TCP receiver port. industrial-scanner-logger defaults to 55256.
# Default: 55256. Range: 1-65535.
port = 55256

# Seconds to wait while opening the TCP connection.
# Default: 5. Range: greater than 0.
connect_timeout = 5

# Seconds to wait for a TCP send operation.
# Default: 5. Range: greater than 0.
send_timeout = 1

# Seconds before retrying after a connection or send failure.
# Default: 5. Range: greater than 0.
retry_interval = 5

# Seconds between queue drain checks while connected and idle.
# Default: 1. Range: greater than 0.
poll_interval = 1

# Enable OS TCP keepalive on the outbound connection.
# Default: true.
tcp_keepalive = true

[buffer]
# Persistent queue database. The service user must be able to create and write this file.
# Default: /var/lib/linux-usb-scanner-client/scans.sqlite3.
database_path = /var/lib/linux-usb-scanner-client/scans.sqlite3

# Number of days to keep sent scan metadata before cleanup. Pending scans are never removed.
# Default: 7. Range: 0 or greater.
sent_retention_days = 14

# Minimum free space required on the queue database filesystem before health reports degraded.
# Pending scans are never deleted automatically; provision more disk before this threshold is reached.
# Default: 1024. Range: 0 or greater.
storage_min_free_mb = 1024

[logging]
# Main troubleshooting log file. Raw barcode payloads are not logged.
# Default: /var/log/linux-usb-scanner-client.log.
log_file = /var/log/linux-usb-scanner-client.log

# Python logging level.
# Default: INFO. Values: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level = INFO

[updates]
# Enables automatic updates from GitHub main through the root-owned
# linux-usb-scanner-client-update.timer. The updater checks the configured branch,
# compares its pyproject.toml version to the installed app version, and only
# installs when the branch has a newer version.
#
# Security note: enabling this lets a root systemd service run scripts/install.sh
# from the configured repository branch. Only enable this for a trusted repository
# you control.
# Default: false.
enabled = false

# Git repository used by the updater. The default is this project repository.
# Default: https://github.com/cosmicc/linux-usb-scanner-client.git
repository_url = https://github.com/cosmicc/linux-usb-scanner-client.git

# Branch checked for newer versions.
# Default: main.
branch = main

# Main app service stopped before install and restarted by scripts/install.sh.
# Default: linux-usb-scanner-client.service.
service_name = linux-usb-scanner-client.service

[alerting]
# Enables the independent monitor service beep alerts.
# The monitor service is installed and started automatically. When enabled, it
# checks app health and plays a repeating beep pattern for the highest-priority
# active problem.
# Default: true.
enabled = true

# Seconds to wait between repeating beep patterns.
# Default: 5. Range: greater than 0.
interval_seconds = 5

# Milliseconds for each quick beep.
# Default: 120. Range: greater than 0.
beep_duration_ms = 120

# Milliseconds between beeps inside a multi-beep pattern.
# Default: 120. Range: 0 or greater.
beep_gap_ms = 120

# Tone frequency used by audio backends that support tones.
# Default: 1000. Range: greater than 0.
tone_hz = 1000

# Beep backend. Use auto unless a specific machine needs one method.
# Values:
#   auto         Try audio card through aplay first, then the system speaker
#                through beep, then console bell as a final fallback.
#   aplay        Generate a tone and play it through ALSA/aplay.
#   beep         Use the Linux beep command and system speaker when available.
#   console_bell Write BEL to console_device; may use system bell if enabled.
#   stdout       Write BEL to stdout; mostly useful for testing.
# Default: auto.
backend = auto

# Console device used by console_bell.
# Default: /dev/console.
console_device = /dev/console

# Command used by the aplay backend. May be a full path or command name.
# Default: aplay.
aplay_command = aplay

# Command used by the beep backend. May be a full path or command name.
# Default: beep.
beep_command = beep

# Repeating alert patterns. The monitor plays only the highest-priority active
# pattern at a time:
#   app not running        = 5 quick beeps every interval
#   USB scanner not found  = 3 quick beeps every interval
#   server unreachable     = 1 quick beep every interval
# Default: 1, 3, and 5.
server_unavailable_beeps = 1
scanner_unavailable_beeps = 3
app_not_running_beeps = 5
